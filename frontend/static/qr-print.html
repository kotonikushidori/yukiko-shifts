<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QRコードシート</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f0f0f0;
      padding: 16px;
    }

    .print-controls {
      text-align: center;
      padding: 16px;
      margin-bottom: 20px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
    }
    .print-controls h1 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #333;
    }
    .print-controls p {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }
    .btn-print {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 28px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-print:hover { background: #1d4ed8; }

    /* A4 シート */
    .qr-sheet {
      background: #fff;
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 15mm;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }

    .qr-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12mm;
    }

    .qr-card {
      border: 1.5px solid #ccc;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      page-break-inside: avoid;
      break-inside: avoid;
    }

    .qr-card-name {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 4px;
      color: #111;
    }
    .qr-card-id {
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
    }
    .qr-canvas-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .qr-hint {
      font-size: 10px;
      color: #aaa;
      margin-top: 6px;
    }

    /* 印刷時: コントロールを非表示 */
    @media print {
      body { background: #fff; padding: 0; }
      .print-controls { display: none; }
      .qr-sheet { box-shadow: none; margin: 0; width: 100%; padding: 10mm; }
    }

    /* ローディング・エラー */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 14px;
    }
    .state-msg.error { color: #dc2626; }
  </style>
</head>
<body>

  <div class="print-controls">
    <h1>QRコードシート印刷</h1>
    <p>作業者ごとのQRコードです。印刷して各自に配布してください。<br>
       スマホでQRを読み取るとログインできます。</p>
    <button class="btn-print" onclick="window.print()">🖨 印刷する</button>
  </div>

  <div class="qr-sheet">
    <div class="qr-grid" id="qr-grid">
      <div class="state-msg">読み込み中...</div>
    </div>
  </div>

  <!-- qrcodejs: ブラウザ向け実績ある QR ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    function escHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const token = localStorage.getItem('shift_token');
    const grid  = document.getElementById('qr-grid');

    if (!token) {
      grid.innerHTML = `<div class="state-msg error">
        ログインが必要です。<br>アプリ画面の「作業者管理」→「QRシート印刷」から開いてください。
      </div>`;
    } else {
      fetch('/api/admin/workers/qr-tokens', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(workers => {
        if (!Array.isArray(workers) || workers.length === 0) {
          grid.innerHTML = '<div class="state-msg">作業者が登録されていません。</div>';
          return;
        }

        // ?id= が指定されている場合は該当作業者のみ表示
        const targetId = new URLSearchParams(window.location.search).get('id');
        if (targetId) {
          workers = workers.filter(w => String(w.id) === targetId);
          if (workers.length === 0) {
            grid.innerHTML = '<div class="state-msg error">該当する作業者が見つかりません。</div>';
            return;
          }
        }

        grid.innerHTML = '';
        const origin = window.location.origin;

        workers.forEach(w => {
          const card = document.createElement('div');
          card.className = 'qr-card';

          const canvasId = 'qr-canvas-' + w.id;
          card.innerHTML = `
            <div class="qr-card-name">${escHtml(w.name)}</div>
            <div class="qr-card-id">社員ID: ${escHtml(w.employee_id)}</div>
            <div class="qr-canvas-wrap" id="${canvasId}"></div>
            <div class="qr-hint">スマホのカメラで読み取り</div>
          `;
          grid.appendChild(card);

          const url = origin + '/qr-login?token=' + encodeURIComponent(w.qr_token);
          // qrcodejs API: new QRCode(element, options)
          new QRCode(document.getElementById(canvasId), {
            text:         url,
            width:        180,
            height:       180,
            correctLevel: QRCode.CorrectLevel.M,
          });
        });
      })
      .catch(e => {
        grid.innerHTML = `<div class="state-msg error">データ取得エラー: ${escHtml(e.message)}</div>`;
      });
    }
  </script>
</body>
</html>
